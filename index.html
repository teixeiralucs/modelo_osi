<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/arquivos.css">
    <link href="https://fonts.googleapis.com/css2?family=Average+Sans&display=swap" rel="stylesheet">
    <title>Modelo OSI - Início</title>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <img src="./assets/osi_model.png" alt="Modelo OSI" class="header-photo">
            <div class="header-text-group">
                <p class="title">Projeto de Redes - Modelo OSI</p>
                <p class="user">Análise de Protocolos</p>
            </div>
        </div>
    </header>

    <main class="content-body">
        <div class="main-controls-row">
            <div class="input-container">
                <input type="text" placeholder="Digite sua mensagem, e-mail ou site" class="text-input input-field">
                <button type="submit" class="request-btn">Enviar</button>
            </div>
        </div>

        <div class="upload-section">
            <label for="arquivo">Selecione um arquivo:</label>
            <input type="file" id="arquivo">
        </div>
        <h1 class="protocol-response"></h1>
    </main>

    <script src="./script/main.js"></script>
</body>
</html>

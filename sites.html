<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/sites.css">
    <link href="https://fonts.googleapis.com/css2?family=Average+Sans&display=swap" rel="stylesheet">
    <title>Modelo OSI - HTTP/HTTPS</title>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <img src="./assets/osi_model.png" alt="Modelo OSI" class="header-photo">
            <div class="header-text-group">
                <p class="title">Módulo Web - Camada 7</p>
                <p class="user">Navegação HTTP/HTTPS</p>
            </div>
        </div>
    </header>

    <main class="content-body">
        <form class="sites-form">
            <h2 class="form-title">Simulador de Requisição Web</h2>
            
            <div class="form-group">
                <label for="web-usuario">Nome de Usuário:</label>
                <input type="text" id="web-usuario" class="input-field" placeholder="Seu usuário de rede..." required>
            </div>

            <div class="form-group">
                <label for="web-host">Host/URL Cadastrada:</label>
                <input type="text" id="web-host-preview" class="input-field disabled-input" readonly>
            </div>

            <div class="form-group">
                <label for="web-metodo">Método HTTP:</label>
                <input type="text" id="web-metodo" class="input-field disabled-input" value="GET" readonly>
            </div>

            <div class="form-group">
                <label for="web-protocolo">Protocolo:</label>
                <input type="text" id="web-protocolo" class="input-field disabled-input" value="HTTP/HTTPS" readonly>
            </div>

            <button type="submit" class="request-btn email-submit-btn">Realizar Request</button>
            <a href="index.html" style="text-align: center; color: #eb5988; margin-top: 1rem;">Voltar ao início</a>
        </form>

        <pre id="output-json" class="hidden"></pre>
    </main>

    <script src="./script/global.js"></script>
    <script src="./script/sites.js"></script>
</body>
</html>
